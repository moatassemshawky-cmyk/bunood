<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بنود | Bunood</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0c4a6e 100%);
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: #0f172a;
      margin-bottom: 30px;
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.5);
      animation: fadeUp 0.8s ease;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 15px;
      animation: fadeUp 0.8s ease 0.1s both;
    }

    .tagline {
      font-size: 1.3rem;
      color: #94a3b8;
      max-width: 500px;
      line-height: 1.7;
      animation: fadeUp 0.8s ease 0.2s both;
    }

    .badge {
      margin-top: 35px;
      padding: 10px 25px;
      border: 1px solid #38bdf8;
      border-radius: 30px;
      color: #38bdf8;
      font-size: 0.95rem;
      animation: fadeUp 0.8s ease 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="logo">ب</div>
  <h1>بنود</h1>
  <p class="tagline">منصة مشتريات مواد البناء — نخلّي تسعير المقايسات أسهل وأسرع</p>
  <div class="badge">قريباً 🚀</div>
</body>
</html>
